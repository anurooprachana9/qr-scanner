<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Attendance Scanner</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 20px; background: #f4f4f4; }
    #reader { width: 100%; max-width: 400px; margin: 0 auto; border-radius: 12px; overflow: hidden; }
    #result { margin-top: 20px; padding: 20px; border-radius: 10px; font-size: 22px; font-weight: bold; display: none; }
    .success { background: #d4edda; color: #155724; }
    .invalid { background: #f8d7da; color: #721c24; }
    .duplicate { background: #fff3cd; color: #856404; }
    button { margin-top: 15px; padding: 14px 28px; font-size: 17px; border: none; border-radius: 8px;
             background: #4285f4; color: white; cursor: pointer; }
    h2 { color: #333; }
  </style>
</head>
<body>
  <h2>QR Attendance Scanner</h2>
  <div id="reader"></div>
  <div id="result"></div>
  <button id="nextBtn" style="display:none;" onclick="scanNext()">Scan Next</button>

  <script>
    // PASTE your deployed Apps Script Web App URL here (ends in /exec)
    const API_URL = "https://script.google.com/a/anuroopwiwaha.com/macros/s/AKfycby3Rxo5enadUSKocbvqTqn1kGxTMmHQwxCgUvmandHA4XNgSARO/exec
";

    let html5QrCode;
    let scanning = false;

    function onScanSuccess(decodedText) {
      if (!scanning) return;
      scanning = false;
      html5QrCode.pause();

      fetch(API_URL + "?token=" + encodeURIComponent(decodedText))
        .then(r => r.json())
        .then(showResult)
        .catch(() => showResult({ status: "invalid" }));
    }

    function showResult(res) {
      const div = document.getElementById('result');
      div.style.display = 'block';
      div.className = res.status;
      if (res.status === 'success') div.innerText = res.name + " scanned successfully ✅";
      else if (res.status === 'duplicate') div.innerText = res.name + " already scanned ⚠️";
      else div.innerText = "Invalid QR Code ❌";
      document.getElementById('nextBtn').style.display = 'inline-block';
    }

    function scanNext() {
      document.getElementById('result').style.display = 'none';
      document.getElementById('nextBtn').style.display = 'none';
      scanning = true;
      html5QrCode.resume();
    }

    function startScanner() {
      html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        onScanSuccess
      ).then(() => { scanning = true; })
       .catch(err => {
         document.getElementById('result').style.display = 'block';
         document.getElementById('result').className = 'invalid';
         document.getElementById('result').innerText = 'Camera error: ' + err;
       });
    }

    window.onload = startScanner;
  </script>
</body>
</html>
